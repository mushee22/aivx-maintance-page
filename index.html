<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Update | AIVX Studio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 480px;
            width: 90%;
            border-top: 5px solid #2563eb;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            color: #0f172a;
        }

        p {
            line-height: 1.6;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .support-card {
            background-color: #f1f5f9;
            padding: 24px;
            border-radius: 12px;
            text-align: left;
        }

        .support-card h2 {
            font-size: 0.85rem;
            margin: 0 0 15px 0;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.15rem;
            transition: color 0.2s;
        }

        .contact-item:hover {
            color: #2563eb;
        }

        .icon-sm {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .email-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .email-link {
            display: flex;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .email-link:hover {
            color: #2563eb;
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">⚠️ System Maintenance</div>
        <h1>We'll be right back</h1>
        <p>Our servers are currently undergoing maintenance to improve your experience. We expect to be back online
            shortly.</p>

        <div class="support-card">
            <h2>Priority Support (Paid Users)</h2>

            <a href="tel:+918606020603" class="contact-item">
                <span class="icon-sm">📞</span> +91 86060 20603
            </a>

            <a href="tel:+919747607816" class="contact-item">
                <span class="icon-sm">📞</span> +91 97476 07816
            </a>

            <div class="email-section">
                <a href="mailto:aivxproductions@gmail.com" class="email-link">
                    <span class="icon-sm">✉️</span> aivxproductions@gmail.com
                </a>
            </div>
        </div>
    </div>
</body>

</html>
